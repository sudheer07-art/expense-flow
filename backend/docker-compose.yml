version: "3.9"

services:

  db:
    image: postgres:16

    container_name: expenseflow-db

    restart: always

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: expenseflow

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: .

    container_name: expenseflow-api

    depends_on:
      - db

    ports:
      - "8000:8000"

    env_file:
      - .env.docker

    volumes:
      - .:/app

    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --reload

volumes:
  postgres_data: